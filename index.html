<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload Functionality</title>
    <script>
        // Function to handle file uploads
        function uploadFile(index) {
            const input = document.getElementById('file-upload-' + index);
            const file = input.files[0];
            if (file) {
                const fileReader = new FileReader();
                fileReader.onload = function() {
                    const fileContent = fileReader.result;
                    localStorage.setItem('file-' + index, fileContent);
                    displayUploadedFiles();
                };
                fileReader.readAsDataURL(file);
            }
        }

        // Function to display uploaded files
        function displayUploadedFiles() {
            const filesContainer = document.getElementById('uploaded-files');
            filesContainer.innerHTML = '';
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('file-')) {
                    const content = localStorage.getItem(key);
                    const index = key.split('-')[1];
                    const fileElement = document.createElement('div');
                    fileElement.innerHTML = `<a href='${content}' download>Download</a> <button onclick='deleteFile(${index})'>Delete</button>`;
                    filesContainer.appendChild(fileElement);
                }
            }
        }

        // Function to delete a file from localStorage
        function deleteFile(index) {
            localStorage.removeItem('file-' + index);
            displayUploadedFiles();
        }

        // Initialize the file upload interface
        document.addEventListener('DOMContentLoaded', function() {
            displayUploadedFiles();
        });
    </script>
</head>
<body>
    <h1>File Upload Functionality</h1>
    <div id="checklist">
        <div>
            <h2>Checklist Item 1</h2>
            <input type="file" id="file-upload-1" accept="image/*,.txt">
            <button onclick="uploadFile(1)">Upload</button>
        </div>
        <div>
            <h2>Checklist Item 2</h2>
            <input type="file" id="file-upload-2" accept="image/*,.txt">
            <button onclick="uploadFile(2)">Upload</button>
        </div>
        <!-- Additional checklist items can be added similarly -->
    </div>
    <h2>Uploaded Files</h2>
    <div id="uploaded-files"></div>
</body>
</html>
