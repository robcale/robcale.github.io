<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#0b1020;
  color:#eaf0ff;
  margin:0;
  padding:20px;
}

.section {
  margin-bottom:20px;
  border:1px solid #2b3a5f;
  border-radius:10px;
  background:#121a2b;
}

.section-header {
  padding:12px;
  cursor:pointer;
  background:#18233a;
}

.item {
  padding:12px;
  border-top:1px solid #2b3a5f;
}

.text {
  margin:8px 0;
}

.toggle {
  cursor:pointer;
  background:#213b65;
  border:none;
  padding:8px;
  border-radius:6px;
  color:white;
  font-size:13px;
}

.toggle:hover {
  background:#294777;
}

.ownwords {
  display:none;
  margin-top:10px;
  padding:10px;
  background:#0b1324;
  border-radius:8px;
}

.upload-btn {
  margin-top:10px;
  padding:6px 10px;
  background:#6ea8fe;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:black;
  font-size:12px;
}

.file-item {
  font-size:12px;
  margin-top:5px;
}
</style>
</head>

<body>

<h2>Checklist</h2>

<div id="app"></div>

<script>
const rawChecklist = `
1. Example Section

[ ] ★★★★★ [DOC] Example checklist item one
[ ] ★★★★☆ [VID] Another checklist item
`;

function parseChecklist(text){
  const lines = text.split('\n');
  let sections = [];
  let current = null;

  lines.forEach(line=>{
    line = line.trim();
    if(!line) return;

    if(/^\d+\./.test(line)){
      current = {title:line, items:[]};
      sections.push(current);
    }
    else if(line.startsWith('[ ]')){
      current.items.push({
        text: line.replace(/^\[ \]\s*/,'')
      });
    }
  });

  return sections;
}

function buildOwnWords(text){
  return "This is your expanded explanation for: " + text;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';

  const sections = parseChecklist(rawChecklist);

  sections.forEach(section=>{
    const sec = document.createElement('div');
    sec.className = 'section';

    const head = document.createElement('div');
    head.className = 'section-header';
    head.textContent = section.title;

    const body = document.createElement('div');

    section.items.forEach((item, i)=>{
      const row = document.createElement('div');
      row.className = 'item';

      const text = document.createElement('div');
      text.className = 'text';
      text.textContent = item.text;

      const toggle = document.createElement('button');
      toggle.className = 'toggle';
      toggle.innerHTML = '▶ In my own words';

      const own = document.createElement('div');
      own.className = 'ownwords';
      own.textContent = buildOwnWords(item.text);

      toggle.onclick = ()=>{
        if(own.style.display === 'block'){
          own.style.display = 'none';
          toggle.innerHTML = '▶ In my own words';
        } else {
          own.style.display = 'block';
          toggle.innerHTML = '▼ In my own words';
        }
      };

      // FILE UPLOAD
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.style.display = 'none';

      const uploadBtn = document.createElement('button');
      uploadBtn.className = 'upload-btn';
      uploadBtn.textContent = 'Upload file';

      const fileList = document.createElement('div');

      uploadBtn.onclick = ()=> fileInput.click();

      fileInput.onchange = ()=>{
        const file = fileInput.files[0];
        if(!file) return;

        const div = document.createElement('div');
        div.className = 'file-item';
        div.textContent = file.name;

        fileList.appendChild(div);
      };

      row.appendChild(text);
      row.appendChild(toggle);
      row.appendChild(own);
      row.appendChild(uploadBtn);
      row.appendChild(fileInput);
      row.appendChild(fileList);

      body.appendChild(row);
    });

    sec.appendChild(head);
    sec.appendChild(body);
    app.appendChild(sec);
  });
}

render();
</script>

</body>
</html>
