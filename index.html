<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank 1 Case System</title>

<style>
body {font-family:Arial;background:#0b1020;color:#eaf0ff;padding:15px;}
h1 {margin-bottom:10px;}
input {width:100%;padding:10px;margin-bottom:15px;border-radius:8px;border:none;}

.section {border:1px solid #2b3a5f;border-radius:10px;margin-bottom:15px;background:#121a2b;}
.section-header {padding:12px;background:#18233a;font-weight:bold;}
.item {padding:10px;border-top:1px solid #2b3a5f;}
.toggle {margin-top:6px;background:#213b65;color:white;border:none;padding:6px;border-radius:6px;}
.own {display:none;margin-top:8px;padding:8px;background:#0b1324;border-radius:6px;}
textarea {width:100%;margin-top:5px;border-radius:6px;}
.upload {margin-top:6px;padding:6px;background:#6ea8fe;border:none;border-radius:6px;}
.file {font-size:12px;}
.timeline {background:#091226;padding:10px;border-radius:10px;margin-bottom:20px;}
</style>
</head>

<body>

<h1>Bank 1 Case File</h1>
<input id="search" placeholder="Search all events, notes, evidence...">

<div class="timeline">
<b>Key Timeline Events</b><br><br>
2:12–2:15 — Officer confirms ER location and movement<br>
2:17 — Requests discharge paperwork<br>
2:21–2:23 — Confirms active bleeding<br>
</div>

<div id="app"></div>

<script>

const data = [

{
title:"Hospital / Immediate Arrest",
items:[
{
text:"Officer confirms he is in ER and bringing me forward",
own:"I was still in the hospital environment receiving care when the officer took control of the situation. I had not completed treatment or been properly discharged.",
},
{
text:"Officer requests discharge paperwork",
own:"They were already trying to move me through the system before I had actually been medically cleared.",
},
{
text:"Officer states I am bleeding",
own:"There is clear acknowledgment from the officer that I was actively bleeding. This confirms a medical issue was happening in real time.",
}
]
},

{
title:"Medical Condition / Neglect",
items:[
{
text:"IV came out / bleeding issue",
own:"My IV had come out or was removed and I was bleeding. This required attention and should have paused everything else.",
},
{
text:"No proper stabilization before custody",
own:"I was not stabilized medically before being taken into custody, which could have worsened my condition.",
}
]
},

{
title:"Officer Conduct",
items:[
{
text:"Continued arrest despite visible medical issue",
own:"Even after recognizing the situation, the officer continued with arrest procedures instead of addressing the medical issue.",
},
{
text:"Ignored urgency of bleeding",
own:"The officer acknowledged the bleeding but did not prioritize stopping it or getting proper treatment.",
}
]
},

{
title:"Custody / Processing",
items:[
{
text:"Transition from medical to custody without clearance",
own:"I was moved from a medical situation directly into custody without proper clearance or documentation.",
},
{
text:"Focus on custody over care",
own:"The actions taken show that custody was prioritized over my immediate health and safety.",
}
]
}

];

const state = JSON.parse(localStorage.getItem("bank1")||"{}");

function save(){localStorage.setItem("bank1",JSON.stringify(state));}

function render(){
const app=document.getElementById("app");
app.innerHTML="";
const q=document.getElementById("search").value.toLowerCase();

data.forEach((sec,s)=>{
const div=document.createElement("div");
div.className="section";

const head=document.createElement("div");
head.className="section-header";
head.textContent=sec.title;

const body=document.createElement("div");

sec.items.forEach((item,i)=>{

const key=s+"-"+i;
const full=(item.text+" "+item.own).toLowerCase();
if(q && !full.includes(q)) return;

const row=document.createElement("div");
row.className="item";

const cb=document.createElement("input");
cb.type="checkbox";
cb.checked=state[key]?.c||false;
cb.onchange=()=>{state[key]=state[key]||{};state[key].c=cb.checked;save();};

const text=document.createElement("div");
text.textContent=item.text;

const toggle=document.createElement("button");
toggle.className="toggle";

const own=document.createElement("div");
own.className="own";

const ta=document.createElement("textarea");
ta.rows=4;
ta.value=state[key]?.n||item.own;
ta.oninput=()=>{state[key]=state[key]||{};state[key].n=ta.value;save();};

own.appendChild(ta);

const open=state[key]?.o||false;
own.style.display=open?"block":"none";
toggle.innerHTML=open?"▼ In my own words":"▶ In my own words";

toggle.onclick=()=>{
const isOpen=own.style.display==="block";
own.style.display=isOpen?"none":"block";
toggle.innerHTML=isOpen?"▶ In my own words":"▼ In my own words";
state[key]=state[key]||{};
state[key].o=!isOpen;
save();
};

const fileInput=document.createElement("input");
fileInput.type="file";
fileInput.style.display="none";

const btn=document.createElement("button");
btn.className="upload";
btn.textContent="Upload evidence";

const list=document.createElement("div");

(state[key]?.f||[]).forEach(f=>{
const d=document.createElement("div");
d.className="file";
d.textContent=f;
list.appendChild(d);
});

btn.onclick=()=>fileInput.click();

fileInput.onchange=()=>{
const f=fileInput.files[0];
if(!f) return;
state[key]=state[key]||{};
state[key].f=state[key].f||[];
state[key].f.push(f.name);
save();
const d=document.createElement("div");
d.className="file";
d.textContent=f.name;
list.appendChild(d);
};

row.appendChild(cb);
row.appendChild(text);
row.appendChild(toggle);
row.appendChild(own);
row.appendChild(btn);
row.appendChild(fileInput);
row.appendChild(list);

body.appendChild(row);

});

div.appendChild(head);
div.appendChild(body);
app.appendChild(div);

});
}

document.getElementById("search").addEventListener("input",render);

render();

</script>

</body>
</html>
